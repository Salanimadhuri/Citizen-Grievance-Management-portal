# ==============================================
# SERVER
# ==============================================
# Render sets PORT automatically — use it
server.port=${PORT:5000}
server.servlet.context-path=/

# ==============================================
# MONGODB
# ==============================================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/grievance-portal}
spring.data.mongodb.auto-index-creation=false

# ==============================================
# EMAIL (SendGrid SMTP or Gmail)
# ==============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@grievanceportal.gov}
spring.mail.password=${MAIL_PASSWORD:disabled}
spring.mail.properties.mail.smtp.auth=${MAIL_ENABLED:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_ENABLED:false}
spring.mail.test-connection=false
app.mail.from=${MAIL_FROM:noreply@grievanceportal.gov}
app.mail.enabled=${MAIL_ENABLED:false}

# ==============================================
# JWT
# ==============================================
app.jwt.secret=${JWT_SECRET:ThisIsAVeryStrongSecretKeyForGrievancePortalMinimum256BitsLong!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ==============================================
# FILE UPLOAD (replaces Multer)
# ==============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}
app.upload.dir=${UPLOAD_DIR:uploads}

# ==============================================
# CORS
# ==============================================
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# ==============================================
# JACKSON / JSON
# ==============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE

# ==============================================
# SWAGGER / SPRINGDOC
# ==============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ==============================================
# ACTUATOR
# ==============================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ==============================================
# LOGGING
# ==============================================
logging.level.com.grievance=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data.mongodb=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# ==============================================
# ML SERVICE
# ==============================================
app.ml.base-url=${ML_SERVICE_URL:http://localhost:8000}
