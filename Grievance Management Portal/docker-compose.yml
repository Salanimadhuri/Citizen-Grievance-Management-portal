version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: grievance-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: grievance-portal
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - grievance-net

  backend:
    build: ./backend
    container_name: grievance-backend
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongodb:27017/grievance-portal
      JWT_SECRET: ${JWT_SECRET:-ChangeThisInProductionMin256BitsLong!}
      FRONTEND_URL: http://localhost:5173
      ML_SERVICE_URL: http://ml-service:8000
      MAIL_ENABLED: "false"
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - ml-service
    networks:
      - grievance-net

  ml-service:
    build: ./ml-service
    container_name: grievance-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ml-models:/app/models/__pycache__
    networks:
      - grievance-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
        VITE_ML_SERVICE_URL: http://localhost:8000
    container_name: grievance-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - grievance-net

volumes:
  mongo-data:
  ml-models:

networks:
  grievance-net:
    driver: bridge
